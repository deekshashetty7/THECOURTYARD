services:
  - type: web
    name: thecourtyard-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: your_jwt_secret_here_change_in_production
      - key: MYSQL_HOST
        value: your_mysql_host
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_USER
        value: your_mysql_user
      - key: MYSQL_PASSWORD
        fromDatabase:
          name: mysql
          property: password
      - key: MYSQL_DATABASE
        value: your_mysql_database
      - key: GMAIL_ADMIN_EMAIL
        value: hecourtyardofficial@gmail.com
      - key: GMAIL_APP_PASSWORD
        fromDatabase:
          name: credentials
          property: gmailPassword
      - key: CLIENT_ORIGIN
        value: https://courtyard-pi.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: your_cloudinary_name
      - key: CLOUDINARY_API_KEY
        value: your_cloudinary_key
      - key: CLOUDINARY_API_SECRET
        value: your_cloudinary_secret
